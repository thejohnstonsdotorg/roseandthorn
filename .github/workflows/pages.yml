name: GitHub Pages — Privacy Policy

# Publishes docs/ to GitHub Pages on every push to master.
# The privacy policy at docs/privacy.html becomes available at:
#   https://thejohnstonsdotorg.github.io/roseandthorn/privacy.html
#
# Prerequisites (one-time, done by repo owner):
#   Repo → Settings → Pages → Source: "GitHub Actions"
#   (The workflow handles deployment; no branch source needed.)

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
  workflow_dispatch:  # allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
