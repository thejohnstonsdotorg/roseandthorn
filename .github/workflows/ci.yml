name: CI — Type check

# Lightweight pre-merge gate: type-checks TypeScript on every PR.
# Does NOT build the native AAB (too slow for CI; use EAS for that).

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: node_modules/.bin/tsc --noEmit

      - name: Store readiness checks
        run: npm run store:check
