plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.mediapipeimagegen'
version = '1.0.0'

android {
  namespace 'expo.modules.mediapipeimagegen'
  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }
}

dependencies {
  implementation 'com.google.mediapipe:tasks-vision-image-generator:0.10.26.1'
}
